<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — DailyTaskReward</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0d1a;
      --surface:  #1a1728;
      --surface2: #231f33;
      --border:   #2e2a42;
      --accent:   #8b5cf6;
      --accent2:  #6d28d9;
      --green:    #10b981;
      --red:      #ef4444;
      --yellow:   #f59e0b;
      --blue:     #3b82f6;
      --text:     #e2e0f0;
      --muted:    #7c7a92;
      --radius:   12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Login screen ── */
    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 32px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .login-box h1 { font-size: 22px; margin-bottom: 6px; color: var(--accent); }
    .login-box p  { color: var(--muted); margin-bottom: 24px; font-size: 13px; }
    .login-box input {
      width: 100%;
      padding: 12px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
      transition: border-color .2s;
    }
    .login-box input:focus { border-color: var(--accent); }
    .login-box input[type="password"] { letter-spacing: 2px; }
    .login-box .err { color: var(--red); font-size: 12px; margin-bottom: 10px; min-height: 18px; }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; padding: 13px; }
    .btn-green   { background: var(--green);  color: #fff; }
    .btn-red     { background: var(--red);    color: #fff; }
    .btn-yellow  { background: var(--yellow); color: #000; }
    .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-sm      { padding: 5px 12px; font-size: 12px; }

    /* ── Main layout ── */
    #adminApp { display: none; }
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-brand { font-weight: 700; font-size: 16px; color: var(--accent); }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .api-url-display { font-size: 11px; color: var(--muted); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .tabs {
      display: flex;
      gap: 4px;
      padding: 16px 24px 0;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .tab-btn {
      padding: 10px 20px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: color .15s, border-color .15s;
    }
    .tab-btn.active { color: var(--accent); border-color: var(--accent); }

    .content { padding: 24px; max-width: 1100px; margin: 0 auto; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 16px;
    }
    .stat-card .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
    .stat-card .value { font-size: 26px; font-weight: 800; }

    /* ── Table ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .card-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .card-header h3 { font-size: 15px; font-weight: 700; }
    .card-header .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .card-header input, .card-header select {
      padding: 7px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 11px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; background: var(--surface2); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(139,92,246,.06); }

    .badge {
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-pending  { background: rgba(245,158,11,.15); color: var(--yellow); }
    .badge-approved { background: rgba(16,185,129,.15); color: var(--green); }
    .badge-rejected { background: rgba(239,68,68,.15);  color: var(--red); }
    .badge-banned   { background: rgba(239,68,68,.15);  color: var(--red); }
    .badge-active   { background: rgba(16,185,129,.15); color: var(--green); }

    .action-row { display: flex; gap: 6px; flex-wrap: wrap; }

    .pagination {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
    }
    .pagination button { min-width: 80px; }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 500;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      max-width: 420px;
      transform: translateY(20px);
      transition: transform .2s;
    }
    .modal-backdrop.open .modal { transform: translateY(0); }
    .modal h3 { margin-bottom: 12px; font-size: 17px; }
    .modal p { color: var(--muted); margin-bottom: 20px; font-size: 13px; line-height: 1.6; }
    .modal input {
      width: 100%;
      padding: 10px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
    }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

    .empty { text-align: center; padding: 40px; color: var(--muted); }
    .loading { text-align: center; padding: 30px; color: var(--muted); }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 13px;
      z-index: 1000;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error   { border-color: var(--red);   color: var(--red); }

    @media (max-width: 600px) {
      .content { padding: 14px; }
      .topbar  { padding: 0 14px; }
      .tabs    { padding: 12px 14px 0; overflow-x: auto; }
      th, td   { padding: 9px 10px; }
    }
  </style>
</head>
<body>

<!-- ── Login ── -->
<div id="loginScreen">
  <div class="login-box">
    <h1>🔐 Admin Panel</h1>
    <p>DailyTaskReward Bot Management</p>
    <input id="serverUrlInput" type="url" placeholder="Server URL (e.g. http://localhost:8080)" autocomplete="url">
    <input id="usernameInput" type="text" placeholder="Username" autocomplete="username">
    <input id="passwordInput" type="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="err" id="loginErr"></div>
    <button class="btn btn-primary" onclick="doLogin()">Login</button>
  </div>
</div>

<!-- ── App ── -->
<div id="adminApp">
  <header class="topbar">
    <span class="topbar-brand">⚙️ Admin Panel</span>
    <div class="topbar-right">
      <span class="api-url-display" id="topApiUrl"></span>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Logout</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" onclick="showTab('dashboard')">📊 Dashboard</button>
    <button class="tab-btn" onclick="showTab('withdrawals')">💸 Withdrawals</button>
    <button class="tab-btn" onclick="showTab('users')">👥 Users</button>
  </nav>

  <div class="content">

    <!-- Dashboard -->
    <div class="tab-panel active" id="tab-dashboard">
      <div class="stats-grid" id="statsGrid">
        <div class="loading">Loading stats…</div>
      </div>
    </div>

    <!-- Withdrawals -->
    <div class="tab-panel" id="tab-withdrawals">
      <div class="card">
        <div class="card-header">
          <h3>Withdrawal Requests</h3>
          <div class="controls">
            <select id="wdStatusFilter" onchange="loadWithdrawals()">
              <option value="pending">Pending</option>
              <option value="approved">Approved</option>
              <option value="rejected">Rejected</option>
              <option value="all">All</option>
            </select>
            <button class="btn btn-ghost btn-sm" onclick="loadWithdrawals()">↻ Refresh</button>
          </div>
        </div>
        <div id="wdTableWrap"><div class="loading">Loading…</div></div>
        <div class="pagination" id="wdPagination" style="display:none">
          <button class="btn btn-ghost btn-sm" id="wdPrevBtn" onclick="wdPage(-1)">◀ Prev</button>
          <span id="wdPageInfo"></span>
          <button class="btn btn-ghost btn-sm" id="wdNextBtn" onclick="wdPage(1)">Next ▶</button>
        </div>
      </div>
    </div>

    <!-- Users -->
    <div class="tab-panel" id="tab-users">
      <div class="card">
        <div class="card-header">
          <h3>Users</h3>
          <div class="controls">
            <input id="userSearch" type="text" placeholder="Search name / username / ID…" oninput="debounceUserSearch()">
            <button class="btn btn-ghost btn-sm" onclick="loadUsers()">↻ Refresh</button>
          </div>
        </div>
        <div id="usersTableWrap"><div class="loading">Loading…</div></div>
        <div class="pagination" id="userPagination" style="display:none">
          <button class="btn btn-ghost btn-sm" id="userPrevBtn" onclick="userPage(-1)">◀ Prev</button>
          <span id="userPageInfo"></span>
          <button class="btn btn-ghost btn-sm" id="userNextBtn" onclick="userPage(1)">Next ▶</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Confirm modal -->
<div class="modal-backdrop" id="confirmModal">
  <div class="modal">
    <h3 id="modalTitle">Confirm</h3>
    <p id="modalBody"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modalConfirmBtn" onclick="modalConfirm()">Confirm</button>
    </div>
  </div>
</div>

<!-- Add Points modal -->
<div class="modal-backdrop" id="pointsModal">
  <div class="modal">
    <h3>Add / Deduct Points</h3>
    <p>Enter positive number to add, negative to deduct. User: <strong id="pointsUserLabel"></strong></p>
    <input id="pointsInput" type="number" placeholder="e.g. 500 or -200">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closePointsModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmAddPoints()">Apply</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ──────────────────────────────────────────────
// State
// ──────────────────────────────────────────────
let API_URL = "";
let TOKEN   = "";
const PAGE_SIZE = 50;
let wdOffset   = 0;
let wdTotal    = 0;
let userOffset = 0;
let userTotal  = 0;
let _modalCb   = null;
let _pointsUserId = null;
let _searchTimer  = null;

// ──────────────────────────────────────────────
// Auth
// ──────────────────────────────────────────────
async function doLogin() {
  const serverUrl = document.getElementById("serverUrlInput").value.trim().replace(/\/$/, "");
  const username  = document.getElementById("usernameInput").value.trim();
  const password  = document.getElementById("passwordInput").value;
  const errEl     = document.getElementById("loginErr");
  errEl.textContent = "";
  if (!serverUrl) { errEl.textContent = "Please enter the server URL."; return; }
  if (!username || !password) { errEl.textContent = "Please enter username and password."; return; }

  API_URL = serverUrl;
  try {
    const res = await fetch(API_URL + "/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || "Login failed."; return; }
    TOKEN = data.token;
    localStorage.setItem("admin_token", TOKEN);
    localStorage.setItem("admin_api_url", API_URL);
    showApp();
  } catch(e) {
    errEl.textContent = "Cannot reach server: " + e.message;
  }
}

function doLogout() {
  localStorage.removeItem("admin_token");
  localStorage.removeItem("admin_api_url");
  API_URL = TOKEN = "";
  document.getElementById("adminApp").style.display    = "none";
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("passwordInput").value = "";
}

function showApp() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("adminApp").style.display    = "block";
  document.getElementById("topApiUrl").textContent     = API_URL;
  loadDashboard();
}

// ──────────────────────────────────────────────
// Fetch helper
// ──────────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch(API_URL + path, {
    ...opts,
    headers: {
      "Authorization": `Bearer ${TOKEN}`,
      "Content-Type": "application/json",
      ...(opts.headers || {}),
    },
  });
  if (res.status === 401) { doLogout(); throw new Error("Unauthorized"); }
  if (!res.ok) { const e = await res.json().catch(()=>({error: res.statusText})); throw new Error(e.error || res.statusText); }
  return res.json();
}

// ──────────────────────────────────────────────
// Toast
// ──────────────────────────────────────────────
function toast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.className = "toast", 3000);
}

// ──────────────────────────────────────────────
// Tabs
// ──────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("tab-" + name).classList.add("active");
  event.currentTarget.classList.add("active");
  if (name === "dashboard")   loadDashboard();
  if (name === "withdrawals") loadWithdrawals();
  if (name === "users")       loadUsers();
}

// ──────────────────────────────────────────────
// Dashboard
// ──────────────────────────────────────────────
async function loadDashboard() {
  const g = document.getElementById("statsGrid");
  g.innerHTML = '<div class="loading">Loading stats…</div>';
  try {
    const s = await api("/api/stats");
    const cards = [
      { label: "Total Users",         value: s.total_users,             color: "#8b5cf6" },
      { label: "New Today",           value: s.today_users,             color: "#3b82f6" },
      { label: "Tasks Today",         value: s.today_tasks,             color: "#10b981" },
      { label: "Pending Withdrawals", value: s.pending_withdrawals,     color: "#f59e0b" },
      { label: "Total Points Given",  value: s.total_points_distributed, color: "#ec4899" },
    ];
    g.innerHTML = cards.map(c => `
      <div class="stat-card">
        <div class="label">${c.label}</div>
        <div class="value" style="color:${c.color}">${c.value?.toLocaleString()}</div>
      </div>`).join("");
  } catch(e) {
    g.innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  }
}

// ──────────────────────────────────────────────
// Withdrawals
// ──────────────────────────────────────────────
async function loadWithdrawals() {
  wdOffset = 0;
  await fetchWithdrawals();
}

async function fetchWithdrawals() {
  const status = document.getElementById("wdStatusFilter").value;
  const wrap   = document.getElementById("wdTableWrap");
  wrap.innerHTML = '<div class="loading">Loading…</div>';
  try {
    const data = await api(`/api/withdrawals?status=${encodeURIComponent(status)}&limit=${PAGE_SIZE}&offset=${wdOffset}`);
    wdTotal = data.total;
    renderWithdrawalsTable(data.rows);
  } catch(e) {
    wrap.innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  }
}

function renderWithdrawalsTable(rows) {
  const wrap = document.getElementById("wdTableWrap");
  if (!rows.length) { wrap.innerHTML = '<div class="empty">No records found.</div>'; hidePagination("wd"); return; }
  const methodLabel = { bkash: "bKash", nagad: "Nagad", rocket: "Rocket" };
  wrap.innerHTML = `<table>
    <thead><tr>
      <th>#</th><th>User</th><th>Amount</th><th>Method</th><th>Number</th><th>Status</th><th>Date</th><th>Actions</th>
    </tr></thead>
    <tbody>
    ${rows.map(w => {
      const name = w.full_name || w.username || w.user_id;
      const status = w.status;
      const badge = `<span class="badge badge-${status}">${status}</span>`;
      const actions = status === "pending" ? `
        <div class="action-row">
          <button class="btn btn-green btn-sm" onclick="confirmAction('approve_wd',${w.id},'Approve withdrawal #${w.id} for ${name}?')">✓ Approve</button>
          <button class="btn btn-red btn-sm"   onclick="confirmAction('reject_wd',${w.id},'Reject and refund points for withdrawal #${w.id}?')">✗ Reject</button>
        </div>` : "—";
      return `<tr>
        <td><code>${w.id}</code></td>
        <td>${escHtml(name)}<br><span style="color:var(--muted);font-size:11px">${w.user_id}</span></td>
        <td><strong>৳${Number(w.amount_bdt).toFixed(2)}</strong><br><span style="color:var(--muted);font-size:11px">${w.points} pts</span></td>
        <td>${methodLabel[w.payment_method] || w.payment_method}</td>
        <td><code>${escHtml(w.payment_number)}</code></td>
        <td>${badge}</td>
        <td>${w.requested_at ? w.requested_at.slice(0,16) : "—"}</td>
        <td>${actions}</td>
      </tr>`;
    }).join("")}
    </tbody>
  </table>`;
  renderPagination("wd", wdOffset, wdTotal);
}

function wdPage(dir) {
  wdOffset = Math.max(0, wdOffset + dir * PAGE_SIZE);
  fetchWithdrawals();
}

// ──────────────────────────────────────────────
// Users
// ──────────────────────────────────────────────
async function loadUsers() {
  userOffset = 0;
  await fetchUsers();
}

async function fetchUsers() {
  const search = document.getElementById("userSearch").value.trim();
  const wrap   = document.getElementById("usersTableWrap");
  wrap.innerHTML = '<div class="loading">Loading…</div>';
  try {
    const data = await api(`/api/users?limit=${PAGE_SIZE}&offset=${userOffset}&search=${encodeURIComponent(search)}`);
    userTotal = data.total;
    renderUsersTable(data.rows);
  } catch(e) {
    wrap.innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  }
}

function renderUsersTable(rows) {
  const wrap = document.getElementById("usersTableWrap");
  if (!rows.length) { wrap.innerHTML = '<div class="empty">No users found.</div>'; hidePagination("user"); return; }
  wrap.innerHTML = `<table>
    <thead><tr>
      <th>ID</th><th>Name</th><th>Username</th><th>Points</th><th>Earned</th><th>Withdrawn</th><th>Status</th><th>Joined</th><th>Actions</th>
    </tr></thead>
    <tbody>
    ${rows.map(u => {
      const banned = u.is_banned === 1;
      const badge = `<span class="badge badge-${banned ? "banned" : "active"}">${banned ? "Banned" : "Active"}</span>`;
      return `<tr>
        <td><code>${u.user_id}</code></td>
        <td>${escHtml(u.full_name || "—")}</td>
        <td>${u.username ? "@" + escHtml(u.username) : "—"}</td>
        <td><strong>${u.points?.toLocaleString()}</strong></td>
        <td>${u.total_earned?.toLocaleString()}</td>
        <td>${u.total_withdrawn?.toLocaleString()}</td>
        <td>${badge}</td>
        <td>${u.joined_at ? u.joined_at.slice(0,10) : "—"}</td>
        <td>
          <div class="action-row">
            <button class="btn btn-yellow btn-sm" onclick="openPointsModal(${u.user_id},'${escHtml(u.full_name || u.username || String(u.user_id))}')">± Pts</button>
            ${banned
              ? `<button class="btn btn-green btn-sm" onclick="confirmAction('unban',${u.user_id},'Unban user ${u.user_id}?')">Unban</button>`
              : `<button class="btn btn-red btn-sm"   onclick="confirmAction('ban',${u.user_id},'Ban user ${u.user_id}? They cannot use the bot.')">Ban</button>`
            }
          </div>
        </td>
      </tr>`;
    }).join("")}
    </tbody>
  </table>`;
  renderPagination("user", userOffset, userTotal);
}

function userPage(dir) {
  userOffset = Math.max(0, userOffset + dir * PAGE_SIZE);
  fetchUsers();
}

function debounceUserSearch() {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(loadUsers, 400);
}

// ──────────────────────────────────────────────
// Pagination helper
// ──────────────────────────────────────────────
function renderPagination(key, offset, total) {
  const el   = document.getElementById(key + "Pagination");
  const info = document.getElementById(key + "PageInfo");
  const prev = document.getElementById(key + "PrevBtn");
  const next = document.getElementById(key + "NextBtn");
  el.style.display = total > PAGE_SIZE ? "flex" : "none";
  const page = Math.floor(offset / PAGE_SIZE) + 1;
  const pages = Math.ceil(total / PAGE_SIZE);
  info.textContent = `Page ${page} / ${pages}  (${total} total)`;
  prev.disabled = offset === 0;
  next.disabled = offset + PAGE_SIZE >= total;
}

function hidePagination(key) {
  document.getElementById(key + "Pagination").style.display = "none";
}

// ──────────────────────────────────────────────
// Confirm modal
// ──────────────────────────────────────────────
function confirmAction(action, id, msg) {
  document.getElementById("modalTitle").textContent = "Confirm Action";
  document.getElementById("modalBody").textContent  = msg;
  const btn = document.getElementById("modalConfirmBtn");
  if      (action === "approve_wd") { btn.className = "btn btn-green"; btn.textContent = "Approve"; }
  else if (action === "reject_wd")  { btn.className = "btn btn-red";   btn.textContent = "Reject"; }
  else if (action === "ban")        { btn.className = "btn btn-red";   btn.textContent = "Ban"; }
  else if (action === "unban")      { btn.className = "btn btn-green"; btn.textContent = "Unban"; }
  _modalCb = () => executeAction(action, id);
  document.getElementById("confirmModal").classList.add("open");
}

function closeModal() {
  document.getElementById("confirmModal").classList.remove("open");
  _modalCb = null;
}

async function modalConfirm() {
  closeModal();
  if (_modalCb) await _modalCb();
}

async function executeAction(action, id) {
  try {
    if (action === "approve_wd") { await api(`/api/withdrawals/${id}/approve`, { method: "POST" }); toast("✅ Withdrawal approved"); fetchWithdrawals(); }
    if (action === "reject_wd")  { await api(`/api/withdrawals/${id}/reject`,  { method: "POST" }); toast("❌ Withdrawal rejected, points refunded"); fetchWithdrawals(); }
    if (action === "ban")        { await api(`/api/users/${id}/ban`,    { method: "POST" }); toast("🚫 User banned"); fetchUsers(); }
    if (action === "unban")      { await api(`/api/users/${id}/unban`,  { method: "POST" }); toast("✅ User unbanned"); fetchUsers(); }
  } catch(e) {
    toast("Error: " + e.message, "error");
  }
}

// ──────────────────────────────────────────────
// Add Points modal
// ──────────────────────────────────────────────
function openPointsModal(userId, label) {
  _pointsUserId = userId;
  document.getElementById("pointsUserLabel").textContent = label + " (#" + userId + ")";
  document.getElementById("pointsInput").value = "";
  document.getElementById("pointsModal").classList.add("open");
}

function closePointsModal() {
  document.getElementById("pointsModal").classList.remove("open");
  _pointsUserId = null;
}

async function confirmAddPoints() {
  const pts = parseInt(document.getElementById("pointsInput").value, 10);
  if (!pts || isNaN(pts)) { toast("Enter a valid number", "error"); return; }
  closePointsModal();
  try {
    await api(`/api/users/${_pointsUserId}/add_points`, { method: "POST", body: JSON.stringify({ points: pts }) });
    toast(pts > 0 ? `✅ +${pts} points added` : `✅ ${pts} points deducted`);
    fetchUsers();
  } catch(e) {
    toast("Error: " + e.message, "error");
  }
}

// ──────────────────────────────────────────────
// Utils
// ──────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Close modals on backdrop click
document.getElementById("confirmModal").addEventListener("click", e => { if(e.target === e.currentTarget) closeModal(); });
document.getElementById("pointsModal").addEventListener("click",  e => { if(e.target === e.currentTarget) closePointsModal(); });

// ──────────────────────────────────────────────
// Auto-login from sessionStorage
// ──────────────────────────────────────────────
(function init() {
  // Restore last-used API URL from localStorage, default to localhost:8080
  const savedUrl   = localStorage.getItem("admin_api_url");
  const savedToken = localStorage.getItem("admin_token");
  document.getElementById("serverUrlInput").value = savedUrl || "http://localhost:8080";

  if (savedUrl && savedToken) {
    API_URL = savedUrl;
    TOKEN   = savedToken;
    showApp();
  }
})();
</script>
